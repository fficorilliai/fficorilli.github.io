<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Federico AI Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; }
    header { padding: 2rem; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.2rem; font-weight: 500; color: #fff; }
    header span { font-size: 0.8rem; color: #555; }
    .content { max-width: 900px; margin: 0 auto; padding: 2rem; }
    .section-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #555; margin-bottom: 1.5rem; }
    .briefing { font-size: 0.9rem; line-height: 1.8; color: #aaa; }
    .briefing h2 { font-size: 1.2rem; font-weight: 500; color: #fff; margin: 1.5rem 0 0.75rem; }
    .briefing h3 { font-size: 1rem; font-weight: 500; color: #ddd; margin: 1.2rem 0 0.5rem; }
