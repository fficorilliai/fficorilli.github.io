<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Federico AI Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; }
    header { padding: 2rem; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.2rem; font-weight: 500; color: #fff; }
    header span { font-size: 0.8rem; color: #555; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1px; background: #222; min-height: calc(100vh - 80px); }
    .card { background: #0f0f0f; padding: 2rem; }
    .card-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
    .card-icon { font-size: 1.2rem; }
    .card-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #555; }
    .card-date { font-size: 0.7rem; color: #333; margin-left: auto; }
    .card-content { font-size: 0.9rem; line-height: 1.7; color: #aaa; }
    .card-content h2 { font-size: 1.1rem; font-weight: 500; color: #fff; margin-bottom: 0.75rem; }
    .card-content strong { color: #e8e8e8; }
    .card-content p { margin-bottom: 0.75rem; }
    .card-content ul { padding-left: 1.2rem; margin-bottom: 0.75rem; }
    .card-content li { margin-bottom: 0.4rem; }
    .tag { display: inline-block; font-size: 0.65rem; padding: 2px 8px; border-radius: 3px; background: #1a1a1a; border: 1px solid #333; color: #666; margin-bottom: 1rem; }
    .empty { color: #333; font-size: 0.85rem; font-style: italic; }
    .footer { padding: 1rem 2rem; border-top: 1px solid #1a1a1a; font-size: 0.7rem; color: #333; text-align: center; }
  </style>
</head>
<body>

<header>
  <h1>Federico — AI Dashboard</h1>
  <span id="last-update"></span>
</header>

<div class="grid">

  <div class="card" id="etf-briefing">
    <div class="card-header">
      <span class="card-icon">📊</span>
      <span class="card-title">ETF Briefing</span>
      <span class="card-date" id="etf-date"></span>
    </div>
    <div class="card-content" id="etf-content">
      <p class="empty">In attesa del prossimo briefing...</p>
    </div>
  </div>

  <div class="card" id="learning">
    <div class="card-header">
      <span class="card-icon">🧠</span>
      <span class="card-title">Learning</span>
      <span class="card-date" id="learning-date"></span>
    </div>
    <div class="card-content" id="learning-content">
      <p class="empty">In attesa della pillola di oggi...</p>
    </div>
  </div>

  <div class="card" id="news">
    <div class="card-header">
      <span class="card-icon">📰</span>
      <span class="card-title">News & Mercati</span>
      <span class="card-date" id="news-date"></span>
    </div>
    <div class="card-content" id="news-content">
      <p class="empty">In attesa delle news di oggi...</p>
    </div>
  </div>

</div>

<div class="footer">
  Aggiornato automaticamente ogni mattina · fficorilli.github.io
</div>

<script>
  document.getElementById('last-update').textContent = new Date().toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
</script>

</body>
</html>
