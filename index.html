    .briefing hr { border: none; border-top: 1px solid #222; margin: 1.5rem 0; }
    .footer { padding: 1rem 2rem; border-top: 1px solid #1a1a1a; font-size: 0.7rem; color: #333; text-align: center; margin-top: 2rem; }
